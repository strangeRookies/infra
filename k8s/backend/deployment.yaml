apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-safety-backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        #중요: 아래 주소는 ECR 창고 주소입니다.
        # 나중에 백엔드 깃액션이 latest 부분을 새로운 커밋 해시 번호로 덮어씌웁니다!
        image: 549328952175.dkr.ecr.ap-northeast-2.amazonaws.com/smart-safety-backend:24692ca73fce527b4f0e0f8bad0c92bbc5cb96a2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: MQTT_HOST
          value: "15.165.248.37"
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        # 데이터베이스 설정
        - name: DB_URL
          value: "jdbc:postgresql://smart-safety-db-prod.cleq04iqogz6.ap-northeast-2.rds.amazonaws.com:5432/postgres?sslmode=require"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: DB_PASSWORD
        # Redis 설정
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: REDIS_PASSWORD
        # 보안 설정
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: JWT_SECRET
        - name: AES_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: AES_SECRET_KEY
        # --- VLM & AI 스냅샷 기능 설정 ---
        - name: SNAPSHOT_CAPTURE_ENABLED
          value: "true"
        - name: SNAPSHOT_UPLOAD_ENABLED
          value: "true"
        - name: VLM_ENABLED
          value: "true"
        - name: VLM_MOCK_MODE
          value: "false"
        - name: VLM_FORCE_MOCK
          value: "false"
        - name: VLM_SNAPSHOT_ASSIST_ENABLED
          value: "true"
        - name: VLM_SNAPSHOT_ASSIST_MOCK_ANALYZE
          value: "false"
        - name: VLM_PGVECTOR_ENABLED
          value: "true"
        - name: AI_VLM_WORKER_BASE_URL
          value: "http://localhost:8091"
        - name: AI_VLM_WORKER_TIMEOUT_SECONDS
          value: "180"
        - name: VLM_EMBEDDING_PROVIDER
          value: "gemini"
        - name: GEMINI_VLM_MODEL
          value: "gemini-2.5-flash"
        - name: VLM_QUERY_EMBEDDING_MODEL
          value: "gemini-embedding-001"
        - name: AI_INTERNAL_VLM_PORT
          value: "8091"
        - name: AI_WEBRTC_SYNC_ENABLED
          value: "false"
        # --- GitHub Secrets 보안 키 연동 ---
        - name: AI_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: AI_SERVICE_TOKEN
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: smart-safety-secrets
              key: GEMINI_API_KEY
        # --- S3 및 CORS 설정 ---
        - name: AWS_S3_BUCKET_NAME
          value: "safety-risk-media-bucket"
        - name: S3_BUCKET_NAME
          value: "safety-risk-media-bucket"
        - name: CORS_ALLOWED_ORIGINS
          value: "http://localhost:5173,http://safety-web-dashboard-bucket.s3-website.ap-northeast-2.amazonaws.com,https://d3gugvv1duxgjy.cloudfront.net"
