services:
  frontend:
    build:
      context: ../strange_front
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://localhost:8080}
        VITE_STREAM_BASE_URL: ${VITE_STREAM_BASE_URL:-http://localhost:18000}
        VITE_CAMERA_1_STREAM_URL: ${VITE_CAMERA_1_STREAM_URL:-http://localhost:8010/stream}
        VITE_CAMERA_2_STREAM_URL: ${VITE_CAMERA_2_STREAM_URL:-http://localhost:8011/stream}
        VITE_CAMERA_3_STREAM_URL: ${VITE_CAMERA_3_STREAM_URL:-http://localhost:8012/stream}
        VITE_CAMERA_4_STREAM_URL: ${VITE_CAMERA_4_STREAM_URL:-http://localhost:8013/stream}
    image: strange-frontend:local
    container_name: strange-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../strange_back
      dockerfile: Dockerfile
    image: strange-backend:local
    container_name: strange-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/strange_safety}
      DB_USERNAME: ${DB_USERNAME:-strange}
      DB_PASSWORD: ${DB_PASSWORD:-strange_local_password}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-safety-backend-local}
      MQTT_TOPIC: ${MQTT_TOPIC:-safety/events}
      WEBSOCKET_ALLOWED_ORIGIN_PATTERNS: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-local-development-jwt-secret-change-before-shared-use-32bytes}
      AES_SECRET_KEY: ${AES_SECRET_KEY:-StrangeSafetyKey}
      AES_IV: ${AES_IV:-StrangeSafetyIv!}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: strange-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strange_safety}
      POSTGRES_USER: ${POSTGRES_USER:-strange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strange_local_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: strange-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t healthcheck -C 1 -W 3 >/tmp/mqtt-health.out 2>/dev/null & pid=$$!; sleep 1; mosquitto_pub -h localhost -p 1883 -t healthcheck -m ok >/dev/null 2>&1; wait $$pid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  redis:
    profiles: ["redis"]
    image: redis:7-alpine
    container_name: strange-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
  mosquitto-data:
  mosquitto-log:
  redis-data:
