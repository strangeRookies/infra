name: Spring Boot CI

# 1. 동작 시점 설정 (Trigger)
on:
  push:
    branches: [ "test-backend" ] #  이 브랜치로 푸시될 때만 작동
  pull_request:
    branches: [ "test-backend" ]

# 2. 실행할 작업 (Jobs)
jobs:
  build:
    runs-on: ubuntu-latest

    # 3. 세부 실행 단계 (Steps)
    steps:
    # 3-1. 저장소 코드 가져오기 (v4 최신 버전 적용)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 3-2. Java 환경 세팅 (JDK 21 기준, v4 최신 버전 적용)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    # 3-3. Gradle 캐싱 (빌드 속도 최적화)
    - name: Gradle Caching
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 3-4. gradlew 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 3-5. Gradle 빌드 및 테스트 실행
    - name: Build with Gradle
      run: ./gradlew build