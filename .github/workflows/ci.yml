name: Spring Boot CI & AI GPU CD

# 1. 동작 시점 설정 (Trigger)
on:
  push:
    branches: [ "test-backend" ] # 이 브랜치로 푸시될 때만 작동
  pull_request:
    branches: [ "test-backend" ]

# 2. 실행할 작업 (Jobs)
jobs:
  # ==========================================
  # [Job 1] 백엔드 빌드 작업
  # ==========================================
  build:
    runs-on: ubuntu-latest

    # 3. 세부 실행 단계 (Steps)
    steps:
    # 3-1. 저장소 코드 가져오기 (v4 최신 버전 적용)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 3-2. Java 환경 세팅 (JDK 21 기준, v4 최신 버전 적용)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    # 3-3. Gradle 캐싱 (빌드 속도 최적화)
    - name: Gradle Caching
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 3-4. gradlew 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 3-5. Gradle 빌드 (DB 접속 등 환경 변수 에러 방지를 위해 test는 생략)
    - name: Build with Gradle
      run: ./gradlew build -x test

  # ==========================================
  # [Job 2] GPU PC 접속 및 AI 프로세스 재배포 작업
  # ==========================================
  deploy-ai-to-gpu:
    needs: build # 반드시 위의 build 과정이 성공해야만 실행됨
    runs-on: ubuntu-latest

    steps:
    - name: SSH to GPU PC and Restart AI Services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GPU_HOST }}
        username: ${{ secrets.GPU_USERNAME }}
        password: ${{ secrets.GPU_PASSWORD }}
        port: 22
        script: |
          echo "==== 0. GPU PC 접속 및 최신 코드 업데이트 ===="
          cd /home/welabs/yolo_training/strange_ai_lstm
          
          git fetch origin
          git checkout codex/ai-worker-flow-improvements
          git pull origin codex/ai-worker-flow-improvements

          echo "==== 1. 기존 포트 및 프로세스 정리 ===="
          # 회원님의 entrypoint.sh에 있는 자폭 방지 킬 로직 완벽 적용
          pkill -f "[s]cripts/run_registered_cameras.py" || true
          pkill -f "[s]cripts/start_simulated_rtsp_from_folder.py" || true
          pkill -f "[s]cripts/serve_ai_overlay.py" || true
          pkill -f "[r]tsp://127.0.0.1:8554" || true
          fuser -k 8010/tcp || true
          fuser -k 8011/tcp || true
          fuser -k 8012/tcp || true
          fuser -k 8013/tcp || true
          docker rm -f mediamtx || true

          echo "==== 2. MediaMTX 실행 ===="
          nohup bash scripts/run_rtsp_server.sh > rtsp_server.log 2>&1 </dev/null &

          echo "==== 3. 가상환경 활성화 및 프로세스 백그라운드 실행 ===="
          source .venv/bin/activate

          nohup python scripts/start_simulated_rtsp_from_folder.py \
            --video-dir /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --backend-url http://localhost:8080 \
            --rtsp-host 127.0.0.1 \
            --rtsp-port 8554 \
            --poll-interval 30 > publisher.log 2>&1 </dev/null &

          # MQTT 고정 IP(15.165.248.37) 반영
          nohup python scripts/run_registered_cameras.py \
            --backend-base-url http://127.0.0.1:8080 \
            --rtsp-base-url rtsp://127.0.0.1:8554 \
            --video-pool /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --overlay-base-port 8010 \
            --detector-mode real \
            --yolo-model yolo26n-pose.pt \
            --publisher mqtt \
            --mqtt-host 15.165.248.37 \
            --mqtt-port 1883 \
            --mqtt-topic safety/events \
            --skip-simulated-ffmpeg > ai_runner.log 2>&1 </dev/null &
          
          echo "==== 모든 AI 프로세스 재시작 완료! ===="