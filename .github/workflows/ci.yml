name: Spring Boot CI & AI GPU CD

# 1. 동작 시점 설정 (Trigger)
on:
  push:
    branches: [ "test-backend" ] # 이 브랜치로 푸시될 때만 작동
  pull_request:
    branches: [ "test-backend" ]

jobs:
  # ==========================================
  # [Job 1] 백엔드 빌드 (기존 코드)
  # ==========================================
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Gradle Caching
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test # (선택) DB 접속 에러 방지를 위해 테스트 생략

  # ==========================================
  # [Job 2] GPU PC AI 서비스 배포 및 재시작 (추가된 코드)
  # ==========================================
  deploy-ai-to-gpu:
    needs: build # 반드시 위의 build 과정이 성공해야만 실행됨
    runs-on: ubuntu-latest

    steps:
    - name: SSH to GPU PC and Restart AI Services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GPU_HOST }}
        username: ${{ secrets.GPU_USERNAME }}
        password: ${{ secrets.GPU_PASSWORD }}
        port: 22
        script: |
          echo "==== 0. GPU PC 접속 및 최신 코드 업데이트 ===="
          cd /home/welabs/yolo_training/strange_ai_lstm
          
          git fetch origin
          git checkout codex/ai-worker-flow-improvements
          git pull origin codex/ai-worker-flow-improvements

          echo "==== 기존 포트 및 프로세스 정리 ===="
          # 불필요한 포트 및 파이썬 프로세스 강제 종료 (에러 무시)
          fuser -k 8010/tcp 2>/dev/null || true
          fuser -k 8011/tcp 2>/dev/null || true
          fuser -k 8012/tcp 2>/dev/null || true
          fuser -k 8013/tcp 2>/dev/null || true
          pkill -f "scripts/serve_ai_overlay.py" 2>/dev/null || true
          pkill -f "start_simulated_rtsp_from_folder.py" 2>/dev/null || true
          pkill -f "run_registered_cameras.py" 2>/dev/null || true
          docker stop mediamtx 2>/dev/null || true
          docker rm mediamtx 2>/dev/null || true

          echo "==== 1. MediaMTX 실행 ===="
          bash scripts/run_rtsp_server.sh

          echo "==== 가상환경 활성화 ===="
          source .venv/bin/activate

          echo "==== 2. RTSP publisher 백그라운드 실행 ===="
          # nohup과 &를 사용하여 백그라운드에서 실행하고 로그를 파일로 저장
          nohup python scripts/start_simulated_rtsp_from_folder.py \
            --video-dir /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --backend-url http://localhost:8080 \
            --rtsp-host 127.0.0.1 \
            --rtsp-port 8554 \
            --poll-interval 30 > publisher.log 2>&1 &

          echo "==== 3. AI runner 백그라운드 실행 ===="
          # 마찬가지로 백그라운드 실행
          nohup python scripts/run_registered_cameras.py \
            --backend-base-url "http://127.0.0.1:8080" \
            --rtsp-base-url "rtsp://127.0.0.1:8554" \
            --video-pool /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --overlay-base-port 8010 \
            --detector-mode real \
            --yolo-model yolo26n-pose.pt \
            --publisher mqtt \
            --mqtt-host "54.116.37.232" \
            --mqtt-port 1883 \
            --mqtt-topic "safety/events" \
            --skip-simulated-ffmpeg > runner.log 2>&1 &

          echo "==== 모든 AI 프로세스 재시작 완료! ===="