name: Spring Boot CI & AI GPU CD

on:
  push:
    branches: [ "test-backend" ]
  pull_request:
    branches: [ "test-backend" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Gradle Caching
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

  deploy-ai-to-gpu:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: SSH to GPU PC and Restart AI Services
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GPU_HOST }}
        username: ${{ secrets.GPU_USERNAME }}
        password: ${{ secrets.GPU_PASSWORD }}
        port: 22
        script: |
          echo "==== 0. GPU PC 접속 및 최신 코드 업데이트 ===="
          cd /home/welabs/yolo_training/strange_ai_lstm
          
          git fetch origin
          git checkout codex/ai-worker-flow-improvements
          git pull origin codex/ai-worker-flow-improvements

          echo "==== 1. 기존 파이썬 프로세스 안전하게 정리 ===="
          # 절대 자폭하지 않는 완벽한 프로세스 킬 방식 (프로그램 이름이 python인 것만 골라서 죽임)
          for pid in $(pgrep -f "scripts/run_registered_cameras.py" || true); do
            if [[ "$(ps -p $pid -o comm= 2>/dev/null)" == *"python"* ]]; then kill -9 $pid || true; fi
          done
          for pid in $(pgrep -f "scripts/start_simulated_rtsp_from_folder.py" || true); do
            if [[ "$(ps -p $pid -o comm= 2>/dev/null)" == *"python"* ]]; then kill -9 $pid || true; fi
          done
          for pid in $(pgrep -f "scripts/serve_ai_overlay.py" || true); do
            if [[ "$(ps -p $pid -o comm= 2>/dev/null)" == *"python"* ]]; then kill -9 $pid || true; fi
          done
          
          docker rm -f mediamtx || true

          echo "==== 2. MediaMTX 실행 ===="
          nohup bash scripts/run_rtsp_server.sh > rtsp_server.log 2>&1 </dev/null &

          echo "==== 3. 가상환경 활성화 및 프로세스 백그라운드 실행 ===="
          source .venv/bin/activate

          nohup python scripts/start_simulated_rtsp_from_folder.py \
            --video-dir /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --backend-url http://arn:aws:elasticloadbalancing:ap-northeast-2:549328952175:loadbalancer/app/safety-backend-alb/718e9fd0627b4e49:8080 \
            --rtsp-host 127.0.0.1 \
            --rtsp-port 8554 \
            --poll-interval 30 > publisher.log 2>&1 </dev/null &

          nohup python scripts/run_registered_cameras.py \
            --backend-base-url http://arn:aws:elasticloadbalancing:ap-northeast-2:549328952175:loadbalancer/app/safety-backend-alb/718e9fd0627b4e49:8080 \
            --rtsp-base-url rtsp://127.0.0.1:8554 \
            --video-pool /home/welabs/yolo_training/ai_fall_experiments/data/raw/indoor_chromakey/videos \
            --overlay-base-port 8010 \
            --detector-mode real \
            --yolo-model yolo26n-pose.pt \
            --publisher mqtt \
            --mqtt-host 15.165.248.37 \
            --mqtt-port 1883 \
            --mqtt-topic safety/events \
            --skip-simulated-ffmpeg > ai_runner.log 2>&1 </dev/null &
          
          echo "==== 모든 AI 프로세스 재시작 완료! ===="