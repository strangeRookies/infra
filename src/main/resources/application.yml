spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: strange-back
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:safety-backend}
  topic: ${MQTT_TOPIC:safety/events}
  reconnect-delay-ms: ${MQTT_RECONNECT_DELAY_MS:5000}
  initial-connect-delay-ms: ${MQTT_INITIAL_CONNECT_DELAY_MS:1000}

app:
  websocket:
    allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.strange.safety: INFO
